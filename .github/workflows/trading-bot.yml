name: RLS Trading Bot

on:
  # STRATEGY DISABLED — re-enable by uncommenting the triggers below
  workflow_dispatch:
    # Manual trigger only (for testing)
    inputs:
      rls_signal:
        description: 'RLS Signal (buy / sell / none)'
        required: false
        default: 'none'
  # schedule:
  #   - cron: '0 * * * *'
  # repository_dispatch:
  #   types: [rls-buy, rls-sell]

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Determine RLS signal
        id: signal
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            EVENT="${{ github.event.action }}"
            if [ "$EVENT" = "rls-buy" ]; then
              echo "rls_signal=buy" >> $GITHUB_OUTPUT
            elif [ "$EVENT" = "rls-sell" ]; then
              echo "rls_signal=sell" >> $GITHUB_OUTPUT
            else
              echo "rls_signal=none" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "rls_signal=${{ github.event.inputs.rls_signal }}" >> $GITHUB_OUTPUT
          else
            echo "rls_signal=none" >> $GITHUB_OUTPUT
          fi

      - name: Run trading bot
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL: ${{ secrets.ALPACA_BASE_URL }}
          EXCHANGE: alpaca
          TRADE_MODE: spot
          PORTFOLIO_VALUE_USD: "1000"
          MAX_TRADE_SIZE_USD: "100"
          MAX_TRADES_PER_DAY: "20"
          SYMBOL: BTCUSD
          TIMEFRAME: 15m
          PAPER_TRADING: "false"
          RLS_SIGNAL: ${{ steps.signal.outputs.rls_signal }}
        run: node bot.js
